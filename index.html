<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AcQuitted Private Fan Player</title>
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      background: #0a0a0a; 
      color: #fff; 
      margin: 0; 
      padding: 20px; 
    }
    #custom-player { 
      max-width: 600px; 
      margin: 20px auto; 
      background: #111; 
      border-radius: 16px; 
      overflow: hidden; 
      box-shadow: 0 10px 30px rgba(255, 60, 0, 0.4); 
    }
    h1 { 
      text-align: center; 
      margin: 15px 0 8px; 
      color: #ff3c00; 
      font-size: 26px; 
    }
    h2, h3 { text-align: center; margin: 4px 0; }
    #waveform { height: 140px; background: #000; position: relative; cursor: pointer; }
    .controls { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 25px; 
      padding: 12px; 
    }
    button { 
      background: none; 
      border: none; 
      color: #fff; 
      font-size: 26px; 
      cursor: pointer; 
    }
    #playBtn { font-size: 40px; }
    .action-btn { font-size: 24px; padding: 8px 14px; }
    #popup { 
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      background: #1a1a1a; padding: 25px; 
      border-radius: 16px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.9); 
      max-width: 360px; text-align: center; 
      z-index: 1000; display: none; 
    }
    .buttons { display: flex; gap: 12px; margin: 20px 0; }
    .btn { flex: 1; padding: 16px; font-size: 17px; border-radius: 999px; cursor: pointer; font-weight: bold; }
    .teal { background: #00d4aa; color: #000; }
    .white { background: #fff; color: #000; }
    .toggle { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; font-size: 15px; }
    iframe { 
      width: 100%; 
      max-width: 600px; 
      margin: 20px auto; 
      display: block; 
      border: 0; 
      height: 680px;   /* Tall enough for full artist image */
    }
  </style>
</head>
<body>

  <div id="custom-player">
    <h1>The AcQuitted</h1>
    <h2 id="title">Loading track...</h2>
    <h3 id="artist">The AcQuitted</h3>
    
    <div id="waveform"></div>
    
    <div class="controls">
      <button onclick="prevTrack()">⏮</button>
      <button id="playBtn" onclick="togglePlay()">▶</button>
      <button onclick="nextTrack()">⏭</button>
    </div>

    <!-- Action Buttons -->
    <div style="display:flex; justify-content:center; gap:30px; padding-bottom:15px;">
      <button class="action-btn" onclick="likeTrack()">❤️ Like</button>
      <button class="action-btn" onclick="shareTrack()">🔗 Share</button>
      <button class="action-btn" onclick="commentTrack()">💬 Comment</button>
    </div>
  </div>

  <!-- Choice Popup -->
  <div id="popup">
    <h3>How would you like to listen?</h3>
    <div class="buttons">
      <button class="btn teal" onclick="chooseOption('browser')">Listen in Browser</button>
      <button class="btn white" onclick="chooseOption('soundcloud')">Open SoundCloud</button>
    </div>
    <div class="toggle">
      <input type="checkbox" id="rememberToggle">
      <label for="rememberToggle">Remember my choice</label>
    </div>
  </div>

  <!-- Official SoundCloud Widget (tall) -->
  <iframe id="sc-widget" width="100%" height="680" scrolling="no" frameborder="no" 
    src="https://w.soundcloud.com/player/?url=https://soundcloud.com/theacquitted&color=%23ff3c00&show_comments=true&show_user=true&show_reposts=false&visual=true">
  </iframe>

  <script>
    let widget;
    let currentTrackPermalink = "";

    window.addEventListener('load', () => {
      widget = SC.Widget(document.getElementById('sc-widget'));
      
      widget.bind(SC.Widget.Events.READY, () => {
        widget.getCurrentSound((sound) => {
          if (sound) {
            document.getElementById('title').textContent = sound.title;
            currentTrackPermalink = sound.permalink_url;
          }
        });
      });

      widget.bind(SC.Widget.Events.PLAY, () => document.getElementById('playBtn').innerHTML = '⏸');
      widget.bind(SC.Widget.Events.PAUSE, () => document.getElementById('playBtn').innerHTML = '▶');
    });

    function togglePlay() {
      if (!widget) return;
      if (localStorage.getItem('listenPreference')) {
        widget.toggle();
      } else {
        document.getElementById('popup').style.display = 'block';
      }
    }

    function chooseOption(option) {
      if (document.getElementById('rememberToggle').checked) {
        localStorage.setItem('listenPreference', option);
      }
      document.getElementById('popup').style.display = 'none';
      widget.play();
    }

    function prevTrack() { widget && widget.prev(); }
    function nextTrack() { widget && widget.next(); }

    function likeTrack() { currentTrackPermalink && window.open(currentTrackPermalink, '_blank'); }
    function shareTrack() { currentTrackPermalink && window.open(currentTrackPermalink, '_blank'); }
    function commentTrack() { currentTrackPermalink && window.open(currentTrackPermalink + "#comments", '_blank'); }

    // Fiery waveform
    const canvas = document.createElement('canvas');
    canvas.width = 580; canvas.height = 140;
    document.getElementById('waveform').appendChild(canvas);
    const ctx = canvas.getContext('2d');

    function drawFire() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const time = Date.now() / 70;
      for (let i = 0; i < canvas.width; i += 4) {
        const h = Math.sin(i/22 + time) * 38 + 82 + Math.random()*22;
        ctx.fillStyle = `hsl(18, 100%, ${55 + Math.random()*35}%)`;
        ctx.fillRect(i, canvas.height - h, 4, h);
      }
      requestAnimationFrame(drawFire);
    }
    drawFire();
  </script>
</body>
</html>
