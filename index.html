<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AcQuitted Jukebox</title>
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <style>
    body { 
      font-family: 'Courier New', monospace; 
      background: #1a0f08; 
      color: #ffd700; 
      margin: 0; 
      padding: 20px; 
    }
    #jukebox { 
      max-width: 620px; 
      margin: 20px auto; 
      background: linear-gradient(#c0c0c0, #808080); 
      border: 14px solid #222; 
      border-radius: 25px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.95), inset 0 0 80px rgba(255,215,0,0.4);
      overflow: hidden;
    }
    .header { 
      background: #111; 
      color: #ff0000; 
      text-align: center; 
      padding: 10px; 
      font-size: 20px; 
      text-shadow: 0 0 10px #ff0000; 
      border-bottom: 6px solid #ffd700;
    }
    #artwork { 
      width: 100%; 
      height: 260px; 
      object-fit: cover; 
      border-bottom: 6px solid #ffd700; 
    }
    h1 { text-align: center; margin: 12px 0 5px; color: #ffd700; font-size: 26px; text-shadow: 0 0 8px #ff0000; }
    #title { text-align: center; margin: 5px 0; font-size: 18px; }
    #waveform { height: 110px; background: #000; margin: 10px; border: 4px solid #333; }
    .controls { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 20px; 
      padding: 12px; 
      background: #222;
    }
    button { 
      background: #333; 
      color: #ffd700; 
      border: 4px solid #ffd700; 
      border-radius: 12px; 
      padding: 10px 18px; 
      font-size: 26px; 
      cursor: pointer; 
    }
    #playBtn { font-size: 38px; padding: 10px 26px; }
    .action-row { 
      display: flex; 
      justify-content: center; 
      gap: 25px; 
      padding: 12px; 
      background: #222; 
    }
    .action-btn { 
      background: #222; 
      color: #ffd700; 
      border: 3px solid #ffd700; 
      padding: 8px 16px; 
      font-size: 18px; 
      border-radius: 50px; 
    }
    iframe { 
      width: 100%; 
      max-width: 620px; 
      margin: 15px auto; 
      display: block; 
      border: 0; 
      height: 680px; 
    }
    #popup { 
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      background: #1a0f08; 
      padding: 30px; 
      border: 8px solid #ffd700; 
      border-radius: 15px; 
      box-shadow: 0 0 40px #ff0000; 
      z-index: 1000; display: none; 
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="jukebox">
    <div class="header">● THE ACQUITTED DINER JUKEBOX ●</div>
    
    <img id="artwork" src="https://i1.sndcdn.com/avatars-000000000000-000000-large.jpg" alt="Album Art">

    <h1>The AcQuitted</h1>
    <h2 id="title">Loading track...</h2>

    <div id="waveform"></div>

    <div class="controls">
      <button onclick="prevTrack()">⏮</button>
      <button id="playBtn" onclick="togglePlay()">▶</button>
      <button onclick="nextTrack()">⏭</button>
    </div>

    <div class="action-row">
      <button class="action-btn" onclick="likeTrack()">❤️ Like</button>
      <button class="action-btn" onclick="shareTrack()">🔗 Share</button>
      <button class="action-btn" onclick="commentTrack()">💬 Comment</button>
    </div>
  </div>

  <!-- Choice Popup -->
  <div id="popup">
    <h3 style="color:#ffd700;">How would you like to listen?</h3>
    <div style="display:flex; gap:15px; margin:25px 0;">
      <button onclick="chooseOption('browser')" style="flex:1; padding:18px; background:#ff0000; color:white; border:none; border-radius:10px; font-size:17px;">Listen in Browser</button>
      <button onclick="chooseOption('soundcloud')" style="flex:1; padding:18px; background:#ffd700; color:#000; border:none; border-radius:10px; font-size:17px;">Open SoundCloud</button>
    </div>
    <label style="color:#ffd700;">
      <input type="checkbox" id="rememberToggle"> Remember my choice
    </label>
  </div>

  <!-- Tall SoundCloud Widget -->
  <iframe id="sc-widget" width="100%" height="680" scrolling="no" frameborder="no" 
    src="https://w.soundcloud.com/player/?url=https://soundcloud.com/theacquitted&color=%23ff3c00&show_comments=true&show_user=true&show_reposts=false&visual=true">
  </iframe>

  <script>
    let widget;
    let currentTrackPermalink = "";

    window.addEventListener('load', () => {
      widget = SC.Widget(document.getElementById('sc-widget'));
      
      widget.bind(SC.Widget.Events.READY, () => {
        updateCurrentTrack();
      });

      widget.bind(SC.Widget.Events.PLAY, () => {
        document.getElementById('playBtn').innerHTML = '⏸';
        updateCurrentTrack();
      });
      widget.bind(SC.Widget.Events.PAUSE, () => document.getElementById('playBtn').innerHTML = '▶');
      widget.bind(SC.Widget.Events.TRACK_CHANGE, () => updateCurrentTrack());
    });

    function updateCurrentTrack() {
      widget.getCurrentSound((sound) => {
        if (sound) {
          document.getElementById('title').textContent = sound.title;
          currentTrackPermalink = sound.permalink_url;
          
          // Update album artwork
          const artwork = document.getElementById('artwork');
          if (sound.artwork_url) {
            artwork.src = sound.artwork_url.replace('-large', '-t500x500');
          }
        }
      });
    }

    function togglePlay() {
      if (!widget) return;
      if (localStorage.getItem('listenPreference')) {
        widget.toggle();
      } else {
        document.getElementById('popup').style.display = 'block';
      }
    }

    function chooseOption(option) {
      if (document.getElementById('rememberToggle').checked) {
        localStorage.setItem('listenPreference', option);
      }
      document.getElementById('popup').style.display = 'none';
      widget.play();
    }

    function prevTrack() { widget && widget.prev(); }
    function nextTrack() { widget && widget.next(); }

    function likeTrack() { currentTrackPermalink && window.open(currentTrackPermalink, '_blank'); }
    function shareTrack() { currentTrackPermalink && window.open(currentTrackPermalink, '_blank'); }
    function commentTrack() { currentTrackPermalink && window.open(currentTrackPermalink + "#comments", '_blank'); }

    // Fiery waveform
    const canvas = document.createElement('canvas');
    canvas.width = 580; canvas.height = 110;
    document.getElementById('waveform').appendChild(canvas);
    const ctx = canvas.getContext('2d');

    function drawFire() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const time = Date.now() / 70;
      for (let i = 0; i < canvas.width; i += 4) {
        const h = Math.sin(i/22 + time) * 35 + 70 + Math.random()*25;
        ctx.fillStyle = `hsl(25, 100%, ${60 + Math.random()*30}%)`;
        ctx.fillRect(i, canvas.height - h, 4, h);
      }
      requestAnimationFrame(drawFire);
    }
    drawFire();
  </script>
</body>
</html>
