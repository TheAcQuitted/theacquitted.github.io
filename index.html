<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Acquitted - Music Player</title>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <style>
        :root {
            --bg: #111;
            --accent: #ffcc00;
            --text: #fff;
            --card: #222;
        }
        [data-theme="light"] {
            --bg: #f4f4f4;
            --accent: #b8860b;
            --text: #222;
            --card: #fff;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #ff4500;
            text-shadow: 0 0 10px #ffcc00;
            margin: 0;
        }
        .player {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .artwork {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        button {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: var(--accent);
            color: #000;
        }
        .donate {
            background: #00c853 !important;
            color: white !important;
            border-color: #00c853;
        }
        .toggle {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
        }
        .set-nav {
            margin: 15px 0;
        }
    </style>
</head>
<body data-theme="dark">
    <div class="header">
        <div></div>
        <h1>🔥 YOUR MUSIC PLAYER</h1>
        <button class="toggle" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="player">
        <iframe id="soundcloud-player" width="100%" height="400" scrolling="no" frameborder="no" 
            allow="autoplay" 
            src="https://w.soundcloud.com/player/?url=https://soundcloud.com/sets/YOUR_MAIN_SET&amp;color=%23ffcc00&amp;auto_play=false&amp;hide_related=false&amp;show_comments=true&amp;show_user=true&amp;show_reposts=false&amp;show_teaser=true&amp;visual=true">
        </iframe>

        <div class="set-nav">
            <!-- Navigation buttons for multiple sets will appear here if you add more -->
        </div>

        <div class="controls">
            <button onclick="prevTrack()">⏮️</button>
            <button onclick="playPause()">▶️ / ⏸️</button>
            <button onclick="nextTrack()">⏭️</button>
        </div>

        <div>
            <button onclick="toggleShuffle()">🔀 SHUFFLE</button>
            <button onclick="toggleRepeat()">🔁 REPEAT</button>
            <button>❤️ Like</button>
            <button onclick="shareTrack()">🔗 Share</button>
            <button>💬 Comment</button>
            <button class="donate" onclick="window.open('https://cash.app/$72turtle72', '_blank')">
                💰 Donate to $72turtle72
            </button>
        </div>
    </div>

    <script>
        // === ADD NEW SOUND CLOUD SETS HERE (one line per set) ===
        const playlists = [
            "https://soundcloud.com/sets/YOUR_MAIN_SET_HERE",  // ← Your main playlist/set
            // "https://soundcloud.com/sets/ANOTHER_PLAYLIST", // ← Add more sets here for expansion
        ];

        let currentIndex = 0;
        let widget = null;
        let isShuffle = false;
        let isRepeat = false;

        function loadPlaylist(index) {
            currentIndex = index;
            const url = playlists[index];
            const iframe = document.getElementById('soundcloud-player');
            iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ffcc00&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true`;
            
            // Re-initialize widget after src change
            setTimeout(() => {
                widget = SC.Widget(iframe);
            }, 800);
        }

        function initPlayer() {
            loadPlaylist(0);
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.toggle').textContent = isDark ? '☀️' : '🌙';
        }

        function toggleShuffle() { isShuffle = !isShuffle; alert('Shuffle ' + (isShuffle ? 'ON 🔥' : 'OFF')); }
        function toggleRepeat() { isRepeat = !isRepeat; alert('Repeat ' + (isRepeat ? 'ON' : 'OFF')); }
        function playPause() { if (widget) widget.toggle(); }
        function prevTrack() { if (widget) widget.prev(); }
        function nextTrack() { if (widget) widget.next(); }
        function shareTrack() { alert('Share this track on X / IG / etc! Link copied.'); } // Customize as needed

        // Auto load
        window.onload = initPlayer;
    </script>
</body>
</html>
