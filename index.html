<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE ACQUITTED JUKEBOX</title>
<style>
  body {
    background: #000;
    color: #ffd700;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    color: #ff5500;
    text-shadow: 0 0 15px #ff0000;
    margin: 10px 0 20px;
  }
  .album-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .album-btn {
    background: #ffd700;
    color: #111;
    border: none;
    padding: 10px 25px;
    font-size: 16px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
  }
  .album-btn:active {
    transform: scale(0.95);
  }
  #player-container {
    max-width: 620px;
    margin: 0 auto 20px;
    border: 6px solid #ffd700;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: #111;
  }
  .controls button {
    background: #222;
    color: #ffd700;
    border: 4px solid #ffd700;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 26px;
    cursor: pointer;
  }
  .controls button:active {
    background: #ffd700;
    color: #111;
  }
  .action-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 15px;
    background: #111;
    border-radius: 16px;
    max-width: 620px;
    margin: 0 auto;
  }
  .action-btn {
    background: #222;
    color: #ffd700;
    border: 3px solid #ffd700;
    padding: 10px 18px;
    font-size: 15px;
    border-radius: 50px;
    cursor: pointer;
    min-width: 110px;
  }
  .action-btn:active {
    background: #ffd700;
    color: #111;
  }
</style>
</head>
<body>

<h1>THE ACQUITTED JUKEBOX</h1>

<!-- Album / Playlist Selector Buttons -->
<div class="album-buttons">
  <button class="album-btn" onclick="loadPlaylist(0)">Red Rock Prayer</button>
  <button class="album-btn" onclick="loadPlaylist(1)">Double Helix</button>
  <button class="album-btn" onclick="loadPlaylist(2)">Third Album</button>
</div>

<!-- Player Container with Yellow Border -->
<div id="player-container">
  <iframe id="sc-widget" 
          width="100%" 
          height="680" 
          scrolling="no" 
          frameborder="no" 
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/theacquitted/sets/red-rock-prayer&color=%23ff5500">
  </iframe>
</div>

<!-- Transport Controls -->
<div class="controls">
  <button onclick="prevTrack()">⏮️</button>
  <button id="playBtn" onclick="togglePlay()">▶️</button>
  <button onclick="nextTrack()">⏭️</button>
</div>

<!-- Action Buttons -->
<div class="action-row">
  <button class="action-btn" onclick="shufflePlaylist()">🔀 SHUFFLE</button>
  <button id="repeatBtn" class="action-btn" onclick="toggleRepeat()">🔁 REPEAT</button>
  <button class="action-btn" onclick="likeTrack()">❤️ Like</button>
  <button class="action-btn" onclick="shareTrack()">🔗 Share</button>
  <button class="action-btn" onclick="commentTrack()">💬 Comment</button>
  <button class="action-btn" onclick="donate()">💰 Tip if you wish</button>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ==================== PLAYLISTS (Albums) ====================
const playlists = [
  { 
    name: "Red Rock Prayer", 
    url: "https://soundcloud.com/theacquitted/sets/red-rock-prayer" 
  },
  { 
    name: "Double Helix", 
    url: "https://soundcloud.com/theacquitted/sets/double-helix" 
  },
  { 
    name: "Third Album", 
    url: "https://soundcloud.com/theacquitted/sets/third-album"   // ← replace with real URL
  }
];

let widget;
let currentIndex = 0;
let repeatMode = false;
let currentPermalink = "";

// Initialize widget
function initWidget() {
  const iframe = document.getElementById('sc-widget');
  widget = SC.Widget(iframe);

  widget.bind(SC.Widget.Events.READY, () => {
    console.log("Widget ready");
  });

  widget.bind(SC.Widget.Events.TRACK_CHANGE, updateTrackInfo);
  widget.bind(SC.Widget.Events.FINISH, onFinish);
}

function loadPlaylist(index) {
  if (!widget || !playlists[index]) return;
  currentIndex = index;
  
  widget.load(playlists[index].url, {
    auto_play: false,
    color: "#ff5500"
  });
  
  // Update title if you want
  document.querySelector('h1').innerHTML = `THE ACQUITTED JUKEBOX<br><small>${playlists[index].name}</small>`;
}

function updateTrackInfo() {
  widget.getCurrentSound((sound) => {
    if (sound && sound.permalink_url) currentPermalink = sound.permalink_url;
  });
}

function onFinish() {
  if (repeatMode) widget.skip(0);
}

function togglePlay() {
  if (!widget) return;
  widget.toggle();
  const btn = document.getElementById('playBtn');
  btn.textContent = btn.textContent === '▶️' ? '⏸️' : '▶️';
}

function prevTrack() {
  if (widget) widget.prev();
}

function nextTrack() {
  if (widget) widget.next();
}

function shufflePlaylist() {
  // Simple shuffle of current set (SoundCloud handles most of it)
  if (widget) widget.skip(Math.floor(Math.random() * 10));
}

function toggleRepeat() {
  repeatMode = !repeatMode;
  const btn = document.getElementById('repeatBtn');
  btn.textContent = repeatMode ? "🔁 REPEAT ON" : "🔁 REPEAT";
  btn.classList.toggle('toggle-on', repeatMode);
}

function likeTrack() {
  const url = currentPermalink || playlists[currentIndex].url;
  window.open(url, '_blank');
}

function shareTrack() {
  const url = currentPermalink || playlists[currentIndex].url;
  window.open(url, '_blank');
}

function commentTrack() {
  const url = currentPermalink || playlists[currentIndex].url;
  window.open(url + "#comments", '_blank');
}

function donate() {
  window.open('https://cash.app/$72turtle72', '_blank');
}

// Start everything
window.onload = function() {
  initWidget();
  
  // Optional: show first album name in title
  setTimeout(() => {
    document.querySelector('h1').innerHTML = `THE ACQUITTED JUKEBOX<br><small>${playlists[0].name}</small>`;
  }, 1200);
};
</script>

</body>
</html>
