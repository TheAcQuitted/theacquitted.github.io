<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Acquitted - Music Player</title>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <style>
        :root {
            --bg: #111;
            --accent: #ffcc00;
            --text: #fff;
        }
        [data-theme="light"] {
            --bg: #222;
            --accent: #ffd700;
            --text: #eee;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            text-align: center;
        }
        .header-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        h1 {
            color: #ff4500;
            text-shadow: 0 0 15px #ffcc00;
            margin: 10px 0 5px;
            font-size: 1.8em;
        }
        .track-info {
            background: rgba(0,0,0,0.6);
            padding: 8px;
            margin: 10px auto;
            max-width: 90%;
            border-radius: 8px;
        }
        .waveform-container {
            background: #222;
            padding: 10px;
            border: 3px solid var(--accent);
            border-radius: 8px;
            margin: 15px auto;
            max-width: 90%;
        }
        iframe {
            width: 100%;
            height: 420px;
            border: none;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .btn {
            background: transparent;
            border: 3px solid var(--accent);
            color: var(--accent);
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--accent);
            color: #000;
        }
        .action-btns {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 15px;
        }
        .action-btn {
            background: transparent;
            border: 3px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .donate {
            background: #00c853 !important;
            color: white !important;
        }
        .toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body data-theme="dark">
    <button class="toggle" onclick="toggleTheme()">🌙</button>
    
    <img src="https://picsum.photos/id/1015/800/200" class="header-img" alt="Header"> <!-- Replace with your car image URL if desired -->

    <h1>STATES OF MIND</h1>
    
    <div class="track-info">
        <div style="color:#ffcc00; font-weight:bold;">Red rock prayer</div>
    </div>

    <div class="waveform-container">
        <iframe id="soundcloud-player" 
            src="https://w.soundcloud.com/player/?url=https://soundcloud.com/sets/YOUR_ACTUAL_SET_URL_HERE&amp;color=%23ffcc00&amp;auto_play=false&amp;visual=true&amp;show_comments=true">
        </iframe>
    </div>

    <div class="controls">
        <div class="btn" onclick="prevTrack()">⏮️</div>
        <div class="btn" onclick="playPause()">▶️</div>
        <div class="btn" onclick="nextTrack()">⏭️</div>
    </div>

    <div class="action-btns">
        <button class="action-btn" onclick="toggleShuffle()">🔀 SHUFFLE</button>
        <button class="action-btn" onclick="toggleRepeat()">🔁 REPEAT OFF</button>
        <button class="action-btn">❤️ Like</button>
        <button class="action-btn" onclick="shareTrack()">🔗 Share</button>
        <button class="action-btn">💬 Comment</button>
        <button class="action-btn donate" onclick="window.open('https://cash.app/$72turtle72', '_blank')">
            💰 Donate to $72turtle72
        </button>
    </div>

    <script>
        // REPLACE THIS WITH YOUR REAL SOUNDCLOUD SET URL
        const setUrl = "https://soundcloud.com/sets/YOUR_ACTUAL_SET_URL_HERE";

        let widget = null;

        function initPlayer() {
            const iframe = document.getElementById('soundcloud-player');
            iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(setUrl)}&color=%23ffcc00&auto_play=false&visual=true&show_comments=true`;
            setTimeout(() => { widget = SC.Widget(iframe); }, 1000);
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            document.querySelector('.toggle').textContent = current === 'dark' ? '☀️' : '🌙';
        }

        function playPause() { if (widget) widget.toggle(); }
        function prevTrack() { if (widget) widget.prev(); }
        function nextTrack() { if (widget) widget.next(); }
        function toggleShuffle() { alert('Shuffle toggled 🔥'); }
        function toggleRepeat() { alert('Repeat toggled'); }
        function shareTrack() { alert('Track link ready to share!'); }

        window.onload = initPlayer;
    </script>
</body>
</html>
