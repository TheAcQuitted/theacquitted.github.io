<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AcQuitted Jukebox</title>
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <style>
    body { 
      font-family: 'Courier New', monospace; 
      background: #1a0f08; 
      color: #ffd700; 
      margin: 0; 
      padding: 20px; 
      background-image: linear-gradient(#2c1e14, #1a0f08);
    }
    #jukebox { 
      max-width: 620px; 
      margin: 20px auto; 
      background: linear-gradient(#c0c0c0, #808080); 
      border: 12px solid #333; 
      border-radius: 20px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.9), inset 0 0 60px rgba(255,215,0,0.3);
      overflow: hidden;
      position: relative;
    }
    .header { 
      background: #222; 
      color: #ff0000; 
      text-align: center; 
      padding: 12px; 
      font-size: 22px; 
      text-shadow: 0 0 10px #ff0000; 
      border-bottom: 4px solid #ffd700;
    }
    h1 { text-align: center; margin: 10px 0 5px; color: #ffd700; font-size: 28px; text-shadow: 0 0 8px #ff0000; }
    #waveform { height: 120px; background: #000; position: relative; cursor: pointer; margin: 10px; border: 3px solid #333; }
    .controls { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      padding: 10px; 
      background: #222;
    }
    button { 
      background: #333; 
      color: #ffd700; 
      border: 3px solid #ffd700; 
      border-radius: 8px; 
      padding: 10px 16px; 
      font-size: 24px; 
      cursor: pointer; 
    }
    #playBtn { font-size: 36px; padding: 8px 24px; }
    .action-row { 
      display: flex; 
      justify-content: center; 
      gap: 25px; 
      padding: 10px; 
      background: #222; 
    }
    .action-btn { 
      background: #222; 
      color: #ffd700; 
      border: 3px solid #ffd700; 
      padding: 8px 14px; 
      font-size: 20px; 
      border-radius: 50px; 
    }
    #popup { 
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      background: #1a0f08; 
      padding: 30px; 
      border: 8px solid #ffd700; 
      border-radius: 12px; 
      box-shadow: 0 0 30px #ff0000; 
      max-width: 360px; 
      text-align: center; 
      z-index: 1000; 
      display: none; 
    }
    iframe { 
      width: 100%; 
      max-width: 620px; 
      margin: 15px auto; 
      display: block; 
      border: 0; 
      height: 720px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <div id="jukebox">
    <div class="header">●●● THE ACQUITTED JUKEBOX ●●●</div>
    <h1>The AcQuitted</h1>
    <h2 id="title">Loading track...</h2>
    <h3 id="artist">The AcQuitted</h3>
    
    <div id="waveform"></div>
    
    <div class="controls">
      <button onclick="prevTrack()">⏮</button>
      <button id="playBtn" onclick="togglePlay()">▶</button>
      <button onclick="nextTrack()">⏭</button>
    </div>

    <div class="action-row">
      <button class="action-btn" onclick="likeTrack()">❤️ Like</button>
      <button class="action-btn" onclick="shareTrack()">🔗 Share</button>
      <button class="action-btn" onclick="commentTrack()">💬 Comment</button>
    </div>
  </div>

  <!-- Choice Popup -->
  <div id="popup">
    <h3 style="color:#ffd700;">How would you like to listen?</h3>
    <div style="display:flex; gap:12px; margin:20px 0;">
      <button onclick="chooseOption('browser')" style="flex:1; padding:16px; background:#ff0000; color:white; border:none; border-radius:8px; font-size:17px;">Listen in Browser</button>
      <button onclick="chooseOption('soundcloud')" style="flex:1; padding:16px; background:#ffd700; color:#000; border:none; border-radius:8px; font-size:17px;">Open SoundCloud</button>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
      <input type="checkbox" id="rememberToggle">
      <label for="rememberToggle" style="color:#ffd700;">Remember my choice</label>
    </div>
  </div>

  <!-- Tall SoundCloud Widget (full playlist view) -->
  <iframe id="sc-widget" width="100%" height="720" scrolling="no" frameborder="no" 
    src="https://w.soundcloud.com/player/?url=https://soundcloud.com/theacquitted&color=%23ff3c00&show_comments=true&show_user=true&show_reposts=false&visual=true">
  </iframe>

  <script>
    let widget;
    let currentTrackPermalink = "";

    window.addEventListener('load', () => {
      widget = SC.Widget(document.getElementById('sc-widget'));
      
      widget.bind(SC.Widget.Events.READY, () => {
        widget.getCurrentSound((sound) => {
          if (sound) {
            document.getElementById('title').textContent = sound.title;
            currentTrackPermalink = sound.permalink_url;
          }
        });
      });

      widget.bind(SC.Widget.Events.PLAY, () => document.getElementById('playBtn').innerHTML = '⏸');
      widget.bind(SC.Widget.Events.PAUSE, () => document.getElementById('playBtn').innerHTML = '▶');
    });

    function togglePlay() {
      if (!widget) return;
      if (localStorage.getItem('listenPreference')) {
        widget.toggle();
      } else {
        document.getElementById('popup').style.display = 'block';
      }
    }

    function chooseOption(option) {
      if (document.getElementById('rememberToggle').checked) {
        localStorage.setItem('listenPreference', option);
      }
      document.getElementById('popup').style.display = 'none';
      widget.play();
    }

    function prevTrack() { widget && widget.prev(); }
    function nextTrack() { widget && widget.next(); }

    function likeTrack() { currentTrackPermalink && window.open(currentTrackPermalink, '_blank'); }
    function shareTrack() { currentTrackPermalink && window.open(currentTrackPermalink, '_blank'); }
    function commentTrack() { currentTrackPermalink && window.open(currentTrackPermalink + "#comments", '_blank'); }

    // Fiery waveform
    const canvas = document.createElement('canvas');
    canvas.width = 580; canvas.height = 120;
    document.getElementById('waveform').appendChild(canvas);
    const ctx = canvas.getContext('2d');

    function drawFire() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const time = Date.now() / 70;
      for (let i = 0; i < canvas.width; i += 4) {
        const h = Math.sin(i/22 + time) * 35 + 75 + Math.random()*20;
        ctx.fillStyle = `hsl(25, 100%, ${60 + Math.random()*30}%)`;
        ctx.fillRect(i, canvas.height - h, 4, h);
      }
      requestAnimationFrame(drawFire);
    }
    drawFire();
  </script>
</body>
</html>
