<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AcQuitted Jukebox</title>
  
  <!-- Mandatory SoundCloud Embed Widget API Library -->
  <script src="https://soundcloud.com"></script>

  <style>
    /* Jukebox Visual Theme Engine Styles */
    body {
      background-color: #0b0b0c;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #ffaa00;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 2rem;
      margin-bottom: 25px;
      text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Top Horizontal Navigation Tab Carousel */
    .tabs-scroll-row {
      display: flex;
      gap: 12px;
      max-width: 950px;
      width: 100%;
      overflow-x: auto;
      padding: 10px;
      margin-bottom: 25px;
      scrollbar-width: thin;
      scrollbar-color: #ffaa00 #161618;
    }

    .tabs-scroll-row::-webkit-scrollbar {
      height: 6px;
    }
    .tabs-scroll-row::-webkit-scrollbar-thumb {
      background-color: #ffaa00;
      border-radius: 3px;
    }

    .jukebox-tab-pill {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
    }

    .jukebox-tab-pill:hover {
      background: rgba(255, 170, 0, 0.15);
    }

    /* Active Category Yellow Highlight Ring Hook */
    .jukebox-tab-pill.active-yellow-highlight {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.6);
    }

    /* Central Display Frame Container matching design mockup layout */
    .player-container {
      background: #121214;
      border: 3px solid #ffaa00;
      border-radius: 12px;
      padding: 15px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      box-sizing: border-box;
    }

    iframe {
      border: none;
      border-radius: 6px;
      background-color: #1a1a1c;
      height: 450px; /* Perfect desktop/tablet canvas height to display full image artwork and tracks list */
      width: 100%;
    }

    /* Core Media Control Deck Layout (Row 1 Directly Below Display Box) */
    .media-bar-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      margin-bottom: 25px;
    }

    .media-btn {
      background: transparent;
      border: 2px solid #ffaa00;
      color: #ffaa00;
      border-radius: 50%;
      width: 55px;
      height: 55px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .media-btn:hover {
      background: #ffaa00;
      color: #0b0b0c;
      transform: scale(1.08);
    }

    .media-btn.play-toggle {
      width: 65px;
      height: 65px;
      font-size: 1.6rem;
    }

    /* Secondary Utility Platform Control Grid (Row 2 Below Box) */
    .interaction-deck {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 800px;
      width: 100%;
    }

    .deck-pill-btn {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 10px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.85rem;
      transition: all 0.2s ease-in-out;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .deck-pill-btn:hover {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Branded CashApp Checkout Theme Action Button Styles */
    .deck-pill-btn.tips-highlight {
      border-color: #22c55e;
      color: #22c55e;
    }

    .deck-pill-btn.tips-highlight:hover {
      background: #22c55e;
      color: #ffffff;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
    }
  </style>
</head>
<body>

  <h1>The AcQuitted Jukebox</h1>

  <!-- Top Scrollable Buttons Bar Container Link Target Grid -->
  <div id="jukebox-tabs-container" class="tabs-scroll-row"></div>

  <!-- Main Showcase Jukebox Monitor Box View -->
  <div class="player-container">
    <iframe id="soundcloud-player" allow="autoplay" src=""></iframe>
  </div>

  <!-- Primary Navigation Audio Controllers Row (Directly Below Player Box) -->
  <div class="media-bar-controls">
    <button class="media-btn" onclick="prevTrack()" title="Previous Playlist">⏮</button>
    <button id="play-pause-btn" class="media-btn play-toggle" onclick="togglePlay()" title="Play / Pause">⏸</button>
    <button class="media-btn" onclick="nextTrack()" title="Next Playlist">⏭</button>
  </div>

  <!-- Secondary Interactive Deck Row Layout (Row 2 Below Player Box) -->
  <div class="interaction-deck">
    <button class="deck-pill-btn" onclick="triggerWidgetAction('shuffle')">🔀 Shuffle</button>
    <button class="deck-pill-btn" onclick="triggerWidgetAction('repeat')">🔁 Repeat</button>
    <button class="deck-pill-btn" onclick="triggerWidgetAction('like')">❤️ Like</button>
    <button class="deck-pill-btn" onclick="triggerWidgetAction('share')">🔗 Share</button>
    <button class="deck-pill-btn" onclick="triggerWidgetAction('comment')">💬 Comment</button>
    
    <!-- CashApp Link Point Configured to your exact Profile handle $72turtle72 -->
    <a href="https://cash.app" target="_blank" class="deck-pill-btn tips-highlight">💰 Tips Here</a>
  </div>

  <script>
    // Master Alphabetically Sorted Matrix Array Index (24 Playlists)
    const playlists = [
      { name: "Country 'Tis Of Thee", url: "https://soundcloud.com" },
      { name: "Double Helix", url: "https://soundcloud.com" },
      { name: "Frogs And Frenz, ACTIVATE!", url: "https://soundcloud.com" },
      { name: "Hollers And Hills And Highways", url: "https://soundcloud.com" },
      { name: "Horus Cope", url: "https://soundcloud.com" },
      { name: "Jubilees", url: "https://soundcloud.com" },
      { name: "MAGAAnonymous", url: "https://soundcloud.com" },
      { name: "New Ends And Old Beginnings", url: "https://soundcloud.com" },
      { name: "One Nation", url: "https://soundcloud.com" },
      { name: "Red Rock Prayer", url: "https://soundcloud.com" },
      { name: "Shiners Moon", url: "https://soundcloud.com" },
      { name: "States Of Mind", url: "https://soundcloud.com" },
      { name: "Sweetleaf Of Mary", url: "https://soundcloud.com" },
      { name: "Temporal Balance", url: "https://soundcloud.com" },
      { name: "The AcQuitted - Desert Sands", url: "https://soundcloud.com" },
      { name: "The AcQuitted - One Nation", url: "https://soundcloud.com" },
      { name: "The AcQuitted - Virtuanon - Feel the...", url: "https://soundcloud.com" },
      { name: "The Road Is My Home", url: "https://soundcloud.com" },
      { name: "Three Seventy Nine", url: "https://soundcloud.com" },
      { name: "Time Line Shift", url: "https://soundcloud.com" },
      { name: "Under Cover", url: "https://soundcloud.com" },
      { name: "Virtuanon - Ascension", url: "https://soundcloud.com" },
      { name: "Virtuanon - Conspiracy Solution", url: "https://soundcloud.com" },
      { name: "We go all!", url: "https://soundcloud.com" }
    ];

    let currentIndex = 0;
    let scWidget = null;
    let isPlaying = true;

    // Dynamically populates the top navigation buttons bar row item tags from the index array
    function createNavigationTabs() {
      const container = document.getElementById("jukebox-tabs-container");
      if (!container) return;
      container.innerHTML = "";

      playlists.forEach((track, index) => {
        const btn = document.createElement("button");
        btn.className = "jukebox-tab-pill";
        btn.innerText = track.name;
        btn.onclick = () => loadTrack(index);
        container.appendChild(btn);
      });
    }

    // Handles resolution checks and loads the playlist asset inside the player panel framework canvas
    async function loadTrack(index) {
      if (index < 0 || index >= playlists.length) return;
      currentIndex = index;
      
      const iframe = document.getElementById("soundcloud-player");
      if (!iframe) return;

      const track = playlists[currentIndex];
      let targetUrl = track.url;

      // Smart Parsing Translation: Handles your app share links automatically on the fly
      if (targetUrl.includes("://soundcloud.com")) {
        try {
          const response = await fetch(`https://corsproxy.io{encodeURIComponent(targetUrl)}`);
          if (response.url) targetUrl = response.url;
        } catch (e) {const simpleSlug = track.name.toLowerCase().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-");targetUrl = https://soundcloud.com{simpleSlug};}}const secureSlug = encodeURIComponent(targetUrl);// ANTI-POPUP SECURITY LOCKDOWN SETTINGS: visual=true & show_teaser=false hides popups while exposing full artworkiframe.src = https://soundcloud.com{secureSlug}&color=%23ffaa00&auto_play=true&hide_related=true&show_comments=true&show_user=true&show_reposts=false&show_teaser=false&buying=false&sharing=false&download=false&visual=true&show_artwork=true;if (window.SC) {scWidget = SC.Widget(iframe);// Auto-advance mechanism to boot next playlist alphabetically when current selection loops outscWidget.bind(SC.Widget.Events.FINISH, () => {nextTrack();});// Keeps play button symbol synced regardless of where user clicks to play/pausescWidget.bind(SC.Widget.Events.PLAY, () => {isPlaying = true;document.getElementById("play-pause-btn").innerText = "⏸";});scWidget.bind(SC.Widget.Events.PAUSE, () => {isPlaying = false;document.getElementById("play-pause-btn").innerText = "▶";});}updateActiveTabUI();}function nextTrack() {let nextIdx = (currentIndex + 1) % playlists.length;loadTrack(nextIdx);}function prevTrack() {let prevIdx = (currentIndex - 1 + playlists.length) % playlists.length;loadTrack(prevIdx);}function togglePlay() {if (!scWidget) return;scWidget.toggle();}// Connects lower button row to actions within the loaded playlist iframe instancefunction triggerWidgetAction(actionType) {if (!scWidget) return;switch(actionType) {case 'shuffle':scWidget.getSounds((sounds) => {if(sounds && sounds.length) {const randomTrackIdx = Math.floor(Math.random() * sounds.length);scWidget.skip(randomTrackIdx);}});break;case 'repeat':scWidget.getCurrentSoundIndex((idx) => {scWidget.skip(idx);});break;case 'like':case 'share':case 'comment':// Prompts user to use secure built-in native buttons to avoid opening separate popup windowsalert(To ${actionType} this selection, please toggle the native integration icons embedded directly inside the player monitor window scene block.);break;}}// Automatically highlights the active menu item and slides it smoothly into view on small screensfunction updateActiveTabUI() {const buttons = document.querySelectorAll(".jukebox-tab-pill");if(!buttons.length) return;buttons.forEach((btn, index) => {if (index === currentIndex) {btn.classList.add("active-yellow-highlight");btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });} else {btn.classList.remove("active-yellow-highlight");}});}// Initialize lifecycle hooks on content frame layout bootwindow.addEventListener("DOMContentLoaded", () => {createNavigationTabs();loadTrack(0);});
