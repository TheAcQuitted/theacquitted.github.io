<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AcQuitted Jukebox</title>
  
  <!-- 1. Mandatory SoundCloud Embed API Library -->
  <script src="https://soundcloud.com"></script>

  <style>
    /* 2. Visual Theme & Layout Engine Styles */
    body {
      background-color: #0b0b0c;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #ffaa00;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 2rem;
      margin-bottom: 25px;
      text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Horizontal scroll row layout for top tabs navigation */
    .tabs-scroll-row {
      display: flex;
      gap: 12px;
      max-width: 900px;
      width: 100%;
      overflow-x: auto;
      padding: 10px;
      margin-bottom: 20px;
      scrollbar-width: thin;
      scrollbar-color: #ffaa00 #161618;
    }

    .tabs-scroll-row::-webkit-scrollbar {
      height: 6px;
    }
    .tabs-scroll-row::-webkit-scrollbar-thumb {
      background-color: #ffaa00;
      border-radius: 3px;
    }

    .jukebox-tab-pill {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
    }

    .jukebox-tab-pill:hover {
      background: rgba(255, 170, 0, 0.15);
      transform: translateY(-1px);
    }

    /* Active category yellow border container highlights rule hook */
    .jukebox-tab-pill.active-yellow-highlight {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.6);
    }

    .player-container {
      background: #121214;
      border: 3px solid #ffaa00;
      border-radius: 12px;
      padding: 15px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    iframe {
      border: none;
      border-radius: 6px;
      background-color: #1a1a1c;
    }

    /* Footer Media Overlay Control Row Layout Elements */
    .media-bar-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 25px;
      margin-top: 20px;
    }

    .media-btn {
      background: transparent;
      border: 2px solid #ffaa00;
      color: #ffaa00;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .media-btn:hover {
      background: #ffaa00;
      color: #0b0b0c;
      transform: scale(1.08);
    }

    .media-btn.play-toggle {
      width: 60px;
      height: 60px;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>

  <h1>The AcQuitted Jukebox</h1>

  <!-- Top Navigation Tab Bar Element Wrapper -->
  <div id="jukebox-tabs-container" class="tabs-scroll-row"></div>

  <!-- Interactive Dashboard Centerpiece Display Case -->
  <div class="player-container">
    <iframe id="soundcloud-player" width="100%" height="400" scrolling="no" allow="autoplay" src=""></iframe>

    <div class="media-bar-controls">
      <button class="media-btn" onclick="prevTrack()">⏮</button>
      <button id="play-pause-btn" class="media-btn play-toggle" onclick="togglePlay()">⏸</button>
      <button class="media-btn" onclick="nextTrack()">⏭</button>
    </div>
  </div>

  <script>
    // 3. Alphabetically Indexed Master Data Matrix
    const playlists = [
      { name: "Country 'Tis Of Thee", url: "https://soundcloud.com" },
      { name: "Double Helix", url: "https://soundcloud.com" },
      { name: "Frogs And Frenz, ACTIVATE!", url: "https://soundcloud.com" },
      { name: "Hollers And Hills And Highways", url: "https://soundcloud.com" },
      { name: "Horus Cope", url: "https://soundcloud.com" },
      { name: "Jubilees", url: "https://soundcloud.com" },
      { name: "MAGAAnonymous", url: "https://soundcloud.com" },
      { name: "New Ends And Old Beginnings", url: "https://soundcloud.com" },
      { name: "One Nation", url: "https://soundcloud.com" },
      { name: "Red Rock Prayer", url: "https://soundcloud.com" },
      { name: "Shiners Moon", url: "https://soundcloud.com" },
      { name: "States Of Mind", url: "https://soundcloud.com" },
      { name: "Sweetleaf Of Mary", url: "https://soundcloud.com" },
      { name: "Temporal Balance", url: "https://soundcloud.com" },
      { name: "The AcQuitted - Desert Sands", url: "https://soundcloud.com" },
      { name: "The AcQuitted - One Nation", url: "https://soundcloud.com" },
      { name: "The AcQuitted - Virtuanon - Feel the...", url: "https://soundcloud.com" },
      { name: "The Road Is My Home", url: "https://soundcloud.com" },
      { name: "Three Seventy Nine", url: "https://soundcloud.com" },
      { name: "Time Line Shift", url: "https://soundcloud.com" },
      { name: "Under Cover", url: "https://soundcloud.com" },
      { name: "Virtuanon - Ascension", url: "https://soundcloud.com" },
      { name: "Virtuanon - Conspiracy Solution", url: "https://soundcloud.com" },
      { name: "We go all", url: "https://soundcloud.com" }
    ];

    let currentIndex = 0;
    let scWidget = null;
    let isPlaying = true;

    // 4. Dynamic Pill Button Grid Generation Engine Logic
    function createNavigationTabs() {
      const container = document.getElementById("jukebox-tabs-container");
      if (!container) return;
      container.innerHTML = "";

      playlists.forEach((track, index) => {
        const btn = document.createElement("button");
        btn.className = "jukebox-tab-pill";
        btn.innerText = track.name;
        btn.onclick = () => loadTrack(index);
        container.appendChild(btn);
      });
    }

    // 5. Track Payload Loader Engine Rule Function
    function loadTrack(index) {
      if (index < 0 || index >= playlists.length) return;
      currentIndex = index;
      
      const iframe = document.getElementById("soundcloud-player");
      if (!iframe) return;

      const track = playlists[currentIndex];
      const secureSlug = encodeURIComponent(track.url);
      
      // Formats parameters to clean standard compliance layout properties
      iframe.src = `https://soundcloud.com{secureSlug}&color=%23ffaa00&auto_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false`;

      // Instantiates bridge listeners across the embedded iframe instance
      if (window.SC) {
        scWidget = SC.Widget(iframe);
        
        // Auto-advance mechanism hooks to load the next alphabetical index when current track finishes
        scWidget.bind(SC.Widget.Events.FINISH, () => {
          nextTrack();
        });
      }
      
      updateActiveTabUI();
    }

    function nextTrack() {
      let nextIdx = (currentIndex + 1) % playlists.length;
      loadTrack(nextIdx);
    }

    function prevTrack() {
      let prevIdx = (currentIndex - 1 + playlists.length) % playlists.length;
      loadTrack(prevIdx);
    }

    function togglePlay() {
      if (!scWidget) return;
      scWidget.toggle();
      
      isPlaying = !isPlaying;
      document.getElementById("play-pause-btn").innerText = isPlaying ? "⏸" : "▶";
    }

    function updateActiveTabUI() {
      const buttons = document.querySelectorAll(".jukebox-tab-pill");
      buttons.forEach((btn, index) => {
        if (index === currentIndex) {
          btn.classList.add("active-yellow-highlight");
          btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else {
          btn.classList.remove("active-yellow-highlight");
        }
      });
    }

    // Initialization lifecycle events
    window.addEventListener("DOMContentLoaded", () => {
      createNavigationTabs();
      loadTrack(0);
    });
  </script>
</body>
</html>
