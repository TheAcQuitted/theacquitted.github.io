<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Acquitted Jukebox</title>
    <script src="https://w.soundcloud.com/player/api.js" defer></script>
    <style>
        body { margin:0; padding:10px; font-family:system-ui; background:#111; color:#fff; text-align:center; transition: background 0.3s, color 0.3s; }
        body.light { background:#f4f4f4; color:#222; }
        h1 { color:#ff4500; text-shadow:0 0 15px #ffcc00; margin:10px 0 5px; font-size:1.8em; }
        .album-nav { display:flex; overflow-x:auto; gap:10px; padding:10px 0; scrollbar-width:none; }
        .album-nav::-webkit-scrollbar { display:none; }
        .nav-btn { padding:10px 20px; border:2px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:30px; white-space:nowrap; flex-shrink:0; cursor:pointer; transition: all 0.2s ease; box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .nav-btn:hover { box-shadow: 0 0 20px rgba(255, 204, 0, 0.6); }
        .nav-btn.active { background:#ffcc00; color:#000; box-shadow: 0 0 20px rgba(255, 204, 0, 0.9); }
        .player-container { max-width:620px; margin:15px auto; background:#1a1a1a; border:3px solid #ffcc00; border-radius:12px; padding:15px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.4); }
        body.light .player-container { background:#fff; border-color:#ffcc00; }
        iframe { width:100%; height:520px; border:none; border-radius:8px; }
        .controls { display:flex; justify-content:center; gap:20px; margin:20px 0; }
        .btn { width:80px; height:80px; border:3px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:12px; font-size:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 15px rgba(255, 204, 0, 0.5); transition: all 0.2s ease; }
        .btn:hover { box-shadow: 0 0 25px rgba(255, 204, 0, 0.8); }
        .action-row { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin:15px 0; }
        .action-btn { padding:12px 24px; border:3px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .action-btn:hover { box-shadow: 0 0 20px rgba(255, 204, 0, 0.6); }
        .song-list { max-width:620px; margin:20px auto; background:#1a1a1a; border:2px solid #ffcc00; border-radius:12px; padding:15px; text-align:left; display:none; }
        body.light .song-list { background:#fff; border-color:#ffcc00; }
        .song-item { padding:8px 0; border-bottom:1px solid #333; cursor:pointer; }
        .song-item:hover { background:#222; color:#ffcc00; }
    </style>
</head>
<body>
    <h1>THE ACQUITTED JUKEBOX</h1>

    <div class="album-nav" id="album-nav"></div>

    <div class="player-container">
        <iframe id="soundcloud-player" allow="autoplay"></iframe>
    </div>

    <div class="controls">
        <div class="btn" onclick="prev()">⏮️</div>
        <div class="btn" onclick="togglePlay()">▶️</div>
        <div class="btn" onclick="next()">⏭️</div>
    </div>

    <div class="action-row">
        <button class="action-btn" onclick="toggleShuffle()">🔀 SHUFFLE</button>
        <button class="action-btn" onclick="toggleRepeat()">🔁 REPEAT</button>
        <button class="action-btn">❤️ Like</button>
        <button class="action-btn" onclick="shareCurrent()">🔗 Share</button>
        <button class="action-btn" onclick="showAllSongs()">📜 All Songs</button>
        <button class="action-btn" onclick="window.open('https://cash.app/$72turtle72','_blank')">Tip if you wish</button>
        <button class="action-btn" onclick="toggleDarkMode()">🌙 / ☀️</button>
    </div>

    <div id="song-list" class="song-list">
        <h3 style="margin-top:0; color:#ffcc00;">All Songs (Alphabetical Toggle)</h3>
        <button onclick="toggleAlphabetical()">A-Z / Original</button>
        <div id="song-list-content"></div>
    </div>

    <script>
        const playlists = [
            { name: "States Of Mind", url: "https://soundcloud.com/theacquitted/sets/state-of-mind" },
            { name: "Sweetleaf Of Mary", url: "https://soundcloud.com/theacquitted/sets/sweetleaf-of-mary" },
            { name: "Under Cover", url: "https://soundcloud.com/theacquitted/sets/under-cover" },
            { name: "Three Seventy Nine", url: "https://soundcloud.com/theacquitted/sets/three-seventy-nine" },
            { name: "Shiners Moon", url: "https://soundcloud.com/theacquitted/sets/shiners-moon" },
            { name: "Hollers And Highways", url: "https://soundcloud.com/theacquitted/sets/hollers-and-hills-and-highways" },
            { name: "Country 'Tis Of Thee", url: "https://soundcloud.com/theacquitted/sets/country-tis-of-thee" },
            { name: "We go all!", url: "https://soundcloud.com/theacquitted/sets/acquitted-double-album-self" },
            { name: "The Road Is My Home", url: "https://soundcloud.com/theacquitted/sets/the-road-is-my-home" },
            { name: "One Nation", url: "https://soundcloud.com/theacquitted/sets/the-acquitted-one-nation" },
            { name: "Temporal Balance", url: "https://soundcloud.com/theacquitted/sets/temporal-balance" },
            { name: "Time Line Shift", url: "https://soundcloud.com/theacquitted/sets/time-line-shift" },
            { name: "Jubilees", url: "https://soundcloud.com/theacquitted/sets/jubilees" },
            { name: "Horus Cope", url: "https://soundcloud.com/theacquitted/sets/horus-cope" },
            { name: "New Ends And Old Beginnings", url: "https://soundcloud.com/theacquitted/sets/new-ends-and-old-beginnings" },
            { name: "Desert Sands", url: "https://soundcloud.com/theacquitted/sets/the-acquitted-desert-sands" },
            { name: "Virtuanon - Conspiracy Solution", url: "https://soundcloud.com/theacquitted/sets/virtuanon-conspiracy" },
            { name: "Virtuanon - Ascension", url: "https://soundcloud.com/theacquitted/sets/the-acquitted-virtuanon" },
            { name: "Frogs And Frenz", url: "https://soundcloud.com/theacquitted/sets/frogs-and-frenz" },
            { name: "MAGANonymous", url: "https://soundcloud.com/theacquitted/sets/maganonymous" },
        ];

        let currentIndex = 0;
        let widget = null;
        let isAlphabetical = false;

        function loadAlbum(index) {
            currentIndex = index;
            const album = playlists[index];
            const iframe = document.getElementById('soundcloud-player');
            iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(album.url)}&color=%23ffcc00&auto_play=false&visual=true&show_comments=true`;
            setTimeout(() => widget = SC.Widget(iframe), 400);
            updateNav();
        }

        function updateNav() {
            const nav = document.getElementById('album-nav');
            nav.innerHTML = '';
            playlists.forEach((album, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = album.name;
                btn.onclick = () => loadAlbum(i);
                if (i === currentIndex) btn.classList.add('active');
                nav.appendChild(btn);
            });
        }

        function togglePlay() { if (widget) widget.toggle(); }
        function prev() { if (widget) widget.prev(); }
        function next() { if (widget) widget.next(); }
        function toggleShuffle() { /* silent */ }
        function toggleRepeat() { /* silent */ }
        function shareCurrent() { navigator.clipboard.writeText(window.location.href); }

        function toggleDarkMode() {
            document.body.classList.toggle('light');
        }

        function showAllSongs() {
            const listDiv = document.getElementById('song-list');
            const content = document.getElementById('song-list-content');
            listDiv.style.display = 'block';
            content.innerHTML = '';

            let allSongs = [];
            playlists.forEach(p => {
                allSongs.push({ playlist: p.name, name: p.name });
            });

            if (isAlphabetical) allSongs.sort((a, b) => a.name.localeCompare(b.name));

            allSongs.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.textContent = song.name;
                content.appendChild(div);
            });
        }

        function toggleAlphabetical() {
            isAlphabetical = !isAlphabetical;
            showAllSongs();
        }

        window.onload = () => {
            if (playlists.length > 0) loadAlbum(0);
        };
    </script>
</body>
</html>
