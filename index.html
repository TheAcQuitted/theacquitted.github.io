<!DOCTYPE html>
<html lang="en">
<head>

  <title>The AcQuitted Jukebox</title>
  
  <!-- Mandatory SoundCloud Embed Widget API Library -->
  <script src="https://soundcloud.com"></script>

  <style>
    body {
      background-color: #0b0b0c;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #ffaa00;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 2rem;
      margin-bottom: 25px;
      text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Fixed Album Buttons Layout Grid matching your layout screenshot */
    .tabs-grid-wrapper {
      display: flex;
      flex-wrap: wrap;       
      justify-content: center;
      gap: 12px;
      max-width: 950px;
      width: 100%;
      padding: 10px;
      margin-bottom: 25px;
    }

    .jukebox-tab-pill {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: bold;
      font-size: 0.9rem;
      transition: all 0.2s ease-in-out;
    }

    .jukebox-tab-pill:hover {
      background: rgba(255, 170, 0, 0.15);
    }

    /* Active Highlight State matching your design mockup */
    .jukebox-tab-pill.active-yellow-highlight {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.6);
    }

    /* Central Monitor Frame Display Box Container Case */
    .player-container {
      background: #121214;
      border: 3px solid #ffaa00;
      border-radius: 12px;
      padding: 15px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      box-sizing: border-box;
      margin-bottom: 25px;
    }

    iframe {
      border: none;
      border-radius: 6px;
      background-color: #1a1a1c;
      height: 450px; 
      width: 100%;
    }

    /* UNIFIED DECK ROW: Arranges skip keys and utility toggles seamlessly */
    .unified-control-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      max-width: 850px;
      width: 100%;
    }

    .control-item-btn {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 10px 22px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      min-height: 46px;
      box-sizing: border-box;
    }

    .control-item-btn:hover {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Modifies structural dimensions for navigation arrow blocks */
    .control-item-btn.media-skip {
      font-size: 1.3rem;
      padding: 5px 24px;
    }
  </style>
</head>

    <button id="play-pause-btn" class="control-item-btn media-skip" onclick="togglePlay()" title="Play / Pause">⏸</button>
    <button class="control-item-btn media-skip" onclick="nextTrack()" title="Next Playlist">⏭</button>

    <!-- CashApp checkout portal button perfectly matching your other gold control items -->

  <script>

      { name: "We go all!", url: "https://soundcloud.com" }
    ];

    let currentIndex = 0;
    let scWidget = null;
    let isPlaying = true;

    async function loadTrack(index) {
      if (index < 0 || index >= playlists.length) return;
      currentIndex = index;
      
      const iframe = document.getElementById("soundcloud-player");
      if (!iframe) return;

      const track = playlists[currentIndex];
      let targetUrl = track.url;
