<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Acquitted Jukebox</title>
    <script src="https://w.soundcloud.com/player/api.js" defer></script>
    <style>
        body { margin:0; padding:10px; font-family:system-ui; background:#111; color:#fff; text-align:center; }
        .header-img { width:100%; max-height:200px; object-fit:cover; border-radius:8px; }
        h1 { color:#ff4500; text-shadow:0 0 15px #ffcc00; margin:10px 0 5px; font-size:1.8em; }
        .album-nav { display:flex; overflow-x:auto; gap:10px; padding:10px 0; scrollbar-width:none; }
        .album-nav::-webkit-scrollbar { display:none; }
        .nav-btn { padding:10px 20px; border:2px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:30px; white-space:nowrap; flex-shrink:0; cursor:pointer; }
        .nav-btn.active { background:#ffcc00; color:#000; }
        .player-container { max-width:620px; margin:15px auto; background:#1a1a1a; border:3px solid #ffcc00; border-radius:12px; padding:15px; }
        iframe { width:100%; height:420px; border:none; border-radius:8px; }
        .controls { display:flex; justify-content:center; gap:20px; margin:20px 0; }
        .btn { width:70px; height:70px; border:3px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:12px; font-size:28px; cursor:pointer; }
        .action-row { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin:15px 0; }
        .action-btn { padding:12px 24px; border:3px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:50px; cursor:pointer; font-weight:bold; }
        .donate { background:#00c853 !important; color:white !important; }
    </style>
</head>
<body>

    <h1>THE ACQUITTED JUKEBOX</h1>

    <div class="album-nav" id="album-nav"></div>

    <div class="player-container">
        <iframe id="soundcloud-player" allow="autoplay"></iframe>
    </div>

    <div class="controls">
        <div class="btn" onclick="prev()">⏮️</div>
        <div class="btn" onclick="togglePlay()">▶️</div>
        <div class="btn" onclick="next()">⏭️</div>
    </div>

    <div class="action-row">
        <button class="action-btn" onclick="toggleShuffle()">🔀 SHUFFLE</button>
        <button class="action-btn" onclick="toggleRepeat()">🔁 REPEAT</button>
        <button class="action-btn">❤️ Like</button>
        <button class="action-btn" onclick="shareCurrent()">🔗 Share</button>
        <button class="action-btn">💬 Comment</button>
        <button class="action-btn donate" onclick="window.open('https://cash.app/$72turtle72','_blank')">💰 Tip $72turtle72</button>
    </div>

    <script>
        // === ADD ALL 21 ALBUMS HERE ===
        const playlists = [
            { name: "Red Rock Prayer", url: "https://soundcloud.com/theacquitted/red-rock-prayer" },
            { name: "Double Helix", url: "https://soundcloud.com/theacquitted/sets/double-helix" },
            // Add the remaining 19 albums here in the same format
            // Example: { name: "Album Name", url: "https://soundcloud.com/theacquitted/sets/album-set" },
        ];

        let currentIndex = 0;
        let widget = null;

        function loadAlbum(index) {
            currentIndex = index;
            const album = playlists[index];
            const iframe = document.getElementById('soundcloud-player');
            iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(album.url)}&color=%23ffcc00&auto_play=false&visual=true&show_comments=true`;
            setTimeout(() => widget = SC.Widget(iframe), 400);
            updateNav();
        }

        function updateNav() {
            const nav = document.getElementById('album-nav');
            nav.innerHTML = '';
            playlists.forEach((album, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = album.name;
                btn.onclick = () => loadAlbum(i);
                if (i === currentIndex) btn.classList.add('active');
                nav.appendChild(btn);
            });
        }

        function togglePlay() { if (widget) widget.toggle(); }
        function prev() { if (widget) widget.prev(); }
        function next() { if (widget) widget.next(); }
        function toggleShuffle() { alert('Shuffle ON 🔥'); }
        function toggleRepeat() { alert('Repeat toggled'); }
        function shareCurrent() { navigator.clipboard.writeText(window.location.href); alert('Link copied!'); }

        window.onload = () => {
            if (playlists.length > 0) loadAlbum(0);
        };
    </script>
</body>
</html>
