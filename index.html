<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Acquitted - Jukebox</title>
    <script src="https://w.soundcloud.com/player/api.js" defer></script>
    <style>
        body { margin:0; padding:20px; font-family:system-ui; background:#111; color:#fff; text-align:center; }
        h1 { color:#ff4500; text-shadow:0 0 15px #ffcc00; margin:10px 0; }
        .player-container { max-width:620px; margin:15px auto; background:#1a1a1a; border:3px solid #ffcc00; border-radius:12px; padding:15px; }
        iframe { width:100%; height:520px; border:none; border-radius:8px; } /* Taller to show full tracklist */
        .album-nav { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:15px 0; }
        .nav-btn { padding:10px 20px; border:2px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:30px; cursor:pointer; font-size:14px; }
        .nav-btn.active { background:#ffcc00; color:#000; }
        .controls, .action-row { display:flex; justify-content:center; gap:15px; margin:20px 0; flex-wrap:wrap; }
        .btn, .action-btn { padding:12px 24px; border:3px solid #ffcc00; background:transparent; color:#ffcc00; border-radius:50px; cursor:pointer; font-weight:bold; }
        .btn:hover, .action-btn:hover { background:#ffcc00; color:#000; }
        .donate { background:#00c853 !important; color:white !important; border-color:#00c853; }
    </style>
</head>
<body>
    <h1>THE ACQUITTED JUKEBOX</h1>

    <div class="album-nav" id="album-nav"></div>

    <div class="player-container">
        <iframe id="soundcloud-player" allow="autoplay"></iframe>
    </div>

    <div class="controls">
        <div class="btn" onclick="prev()">⏮️</div>
        <div class="btn" onclick="togglePlay()">▶️</div>
        <div class="btn" onclick="next()">⏭️</div>
    </div>

    <div class="action-row">
        <button class="action-btn" onclick="toggleShuffle()">🔀 SHUFFLE</button>
        <button class="action-btn" onclick="toggleRepeat()">🔁 REPEAT</button>
        <button class="action-btn">❤️ Like</button>
        <button class="action-btn" onclick="shareCurrent()">🔗 Share</button>
        <button class="action-btn">💬 Comment</button>
        <button class="action-btn donate" onclick="window.open('https://cash.app/$72turtle72','_blank')">💰 Tip $72turtle72</button>
    </div>

    <script>
        // === ADD YOUR ALBUMS/PLAYLISTS HERE ===
        const playlists = [
            { name: "Red Rock Prayer", url: "https://soundcloud.com/theacquitted/red-rock-prayer" },
            { name: "Double Helix", url: "https://soundcloud.com/theacquitted/sets/your-double-helix-set" }, // Replace with real set URLs
            // Add more albums here — they auto-update when you add tracks on SoundCloud
        ];

        let currentIndex = 0;
        let widget = null;

        function loadAlbum(index) {
            currentIndex = index;
            const album = playlists[index];
            document.getElementById('soundcloud-player').src = 
                `https://w.soundcloud.com/player/?url=${encodeURIComponent(album.url)}&color=%23ffcc00&auto_play=false&visual=true&show_comments=true&single_active=true`;
            
            document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===index));
            setTimeout(() => widget = SC.Widget(document.getElementById('soundcloud-player')), 600);
        }

        function createNav() {
            const nav = document.getElementById('album-nav');
            nav.innerHTML = '';
            playlists.forEach((album, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = album.name;
                btn.onclick = () => loadAlbum(i);
                nav.appendChild(btn);
            });
            loadAlbum(0);
        }

        function togglePlay() { if (widget) widget.toggle(); }
        function prev() { if (widget) widget.prev(); }
        function next() { if (widget) widget.next(); }
        function toggleShuffle() { alert('Shuffle ON 🔥'); }
        function toggleRepeat() { alert('Repeat toggled'); }
        function shareCurrent() { 
            navigator.clipboard.writeText(window.location.href);
            alert('Album link copied!');
        }

        window.onload = createNav;
    </script>
</body>
</html>
