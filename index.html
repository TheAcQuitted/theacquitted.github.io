<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AcQuitted Jukebox</title>
  
  <!-- Mandatory SoundCloud Embed Widget API Library -->
  <script src="https://soundcloud.com"></script>

  <style>
    body {
      background-color: #0b0b0c;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #ffaa00;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 2rem;
      margin-bottom: 25px;
      text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Multi-Line Wrapping Button Grid Layout for Album Selection */
    .tabs-grid-wrapper {
      display: flex;
      flex-wrap: wrap;       
      justify-content: center;
      gap: 12px;
      max-width: 950px;
      width: 100%;
      padding: 10px;
      margin-bottom: 25px;
    }

    .jukebox-tab-pill {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
    }

    .jukebox-tab-pill:hover {
      background: rgba(255, 170, 0, 0.15);
    }

    /* Active Selection Highlight Styling Rules */
    .jukebox-tab-pill.active-yellow-highlight {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.6);
    }

    /* Central Presentation Display Monitor Container Case */
    .player-container {
      background: #121214;
      border: 3px solid #ffaa00;
      border-radius: 12px;
      padding: 15px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      box-sizing: border-box;
      margin-bottom: 25px;
    }

    iframe {
      border: none;
      border-radius: 6px;
      background-color: #1a1a1c;
      height: 450px; 
      width: 100%;
    }

    /* UNIFIED BOTTOM DECK: Arranges all action items natively in one single wrapping line layout */
    .unified-control-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      max-width: 850px;
      width: 100%;
    }

    .control-item-btn {
      background: transparent;
      color: #ffaa00;
      border: 2px solid #ffaa00;
      padding: 10px 22px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      min-height: 46px;
      box-sizing: border-box;
    }

    .control-item-btn:hover {
      background: #ffaa00;
      color: #0b0b0c;
      box-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }

    /* Explicit scaling formatting for standard media deck navigation glyphs */
    .control-item-btn.media-skip {
      font-size: 1.3rem;
      padding: 5px 24px;
    }
  </style>
</head>
<body>

  <h1>The AcQuitted Jukebox</h1>

  <!-- Top Navigation Pill Grid Carousel Wrapper -->
  <div id="jukebox-tabs-container" class="tabs-grid-wrapper"></div>

  <!-- Central Jukebox Visual Monitoring Core Display Case Box -->
  <div class="player-container">
    <iframe id="soundcloud-player" allow="autoplay" src=""></iframe>
  </div>

  <!-- PROPERLY MERGED COMPACT INTERACTION DECK CONSOLE BAR -->
  <div class="unified-control-bar">
    <button class="control-item-btn media-skip" onclick="prevTrack()" title="Previous Playlist">⏮</button>
    <button id="play-pause-btn" class="control-item-btn media-skip" onclick="togglePlay()" title="Play / Pause">⏸</button>
    <button class="control-item-btn media-skip" onclick="nextTrack()" title="Next Playlist">⏭</button>
    
    <button class="control-item-btn" onclick="triggerWidgetAction('shuffle')">🔀 Shuffle</button>
    <button class="control-item-btn" onclick="triggerWidgetAction('repeat')">🔁 Repeat</button>
    <button class="control-item-btn" onclick="triggerWidgetAction('like')">❤️ Like</button>
    <button class="control-item-btn" onclick="triggerWidgetAction('share')">🔗 Share</button>
    <button class="control-item-btn" onclick="triggerWidgetAction('comment')">💬 Comment</button>
    
    <!-- CashApp Link styled seamlessly to perfectly match your other gold jukebox keys -->
    <a href="https://cash.app" target="_blank" class="control-item-btn" title="Support via CashApp">💰 Tips Here</a>
  </div>

  <script>
    // Master Alphabetical Playlists Reference Array Checklist Matrix (24 Entries)
    const playlists = [
      { name: "Country 'Tis Of Thee", url: "https://soundcloud.com" },
      { name: "Double Helix", url: "https://soundcloud.com" },
      { name: "Frogs And Frenz, ACTIVATE!", url: "https://soundcloud.com" },
      { name: "Hollers And Hills And Highways", url: "https://soundcloud.com" },
      { name: "Horus Cope", url: "https://soundcloud.com" },
      { name: "Jubilees", url: "https://soundcloud.com" },
      { name: "MAGAAnonymous", url: "https://soundcloud.com" },
      { name: "New Ends And Old Beginnings", url: "https://soundcloud.com" },
      { name: "One Nation", url: "https://soundcloud.com" },
      { name: "Red Rock Prayer", url: "https://soundcloud.com" },
      { name: "Shiners Moon", url: "https://soundcloud.com" },
      { name: "States Of Mind", url: "https://soundcloud.com" },
      { name: "Sweetleaf Of Mary", url: "https://soundcloud.com" },
      { name: "Temporal Balance", url: "https://soundcloud.com" },
      { name: "The AcQuitted - Desert Sands", url: "https://soundcloud.com" },
      { name: "The AcQuitted - One Nation", url: "https://soundcloud.com" },
      { name: "The AcQuitted - Virtuanon - Feel the...", url: "https://soundcloud.com" },
      { name: "The Road Is My Home", url: "https://soundcloud.com" },
      { name: "Three Seventy Nine", url: "https://soundcloud.com" },
      { name: "Time Line Shift", url: "https://soundcloud.com" },
      { name: "Under Cover", url: "https://soundcloud.com" },
      { name: "Virtuanon - Ascension", url: "https://soundcloud.com" },
      { name: "Virtuanon - Conspiracy Solution", url: "https://soundcloud.com" },
      { name: "We go all!", url: "https://soundcloud.com" }
    ];

    let currentIndex = 0;
    let scWidget = null;
    let isPlaying = true;

    function createNavigationTabs() {
      const container = document.getElementById("jukebox-tabs-container");
      if (!container) return;
      container.innerHTML = "";

      playlists.forEach((track, index) => {
        const btn = document.createElement("button");
        btn.className = "jukebox-tab-pill";
        btn.innerText = track.name;
        btn.onclick = () => loadTrack(index);
        container.appendChild(btn);
      });
    }

    async function loadTrack(index) {
      if (index < 0 || index >= playlists.length) return;
      currentIndex = index;
      
      const iframe = document.getElementById("soundcloud-player");
      if (!iframe) return;

      const track = playlists[currentIndex];
      let targetUrl = track.url;

      if (targetUrl.includes("://soundcloud.com")) {
        try {
          const response = await fetch(`https://corsproxy.io{encodeURIComponent(targetUrl)}`);
          if (response.url) targetUrl = response.url;
        } catch (e) {
          const simpleSlug = track.name.toLowerCase().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-");
          targetUrl = `https://soundcloud.com{simpleSlug}`;
        }
      }

      const secureSlug = encodeURIComponent(targetUrl);
      iframe.src = `https://soundcloud.com{secureSlug}&color=%23ffaa00&auto_play=true&hide_related=true&show_comments=true&show_user=true&show_reposts=false&show_teaser=false&buying=false&sharing=false&download=false&visual=true&show_artwork=true`;

      if (window.SC) {
        scWidget = SC.Widget(iframe);
        
        scWidget.bind(SC.Widget.Events.FINISH, () => {
          nextTrack();
        });
        
        scWidget.bind(SC.Widget.Events.PLAY, () => {
          isPlaying = true;
          document.getElementById("play-pause-btn").innerText = "⏸";
        });
        scWidget.bind(SC.Widget.Events.PAUSE, () => {
          isPlaying = false;
          document.getElementById("play-pause-btn").innerText = "▶";
        });
      }
      
      updateActiveTabUI();
    }

    function nextTrack() {
      let nextIdx = (currentIndex + 1) % playlists.length;
      loadTrack(nextIdx);
    }

    function prevTrack() {
      let prevIdx = (currentIndex - 1 + playlists.length) % playlists.length;
      loadTrack(prevIdx);
    }

    function togglePlay() {
      if (!scWidget) return;
      scWidget.toggle();
    }

    function triggerWidgetAction(actionType) {
      if (!scWidget) return;
