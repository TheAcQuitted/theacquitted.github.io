
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Your Epic Music Player</title>
<style>
  body {
    background: #111;
    color: #ffd700;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 {
    text-align: center;
    margin: 8px 0 4px;
    color: #ffd700;
    font-size: 26px;
    text-shadow: 0 0 10px #ff0000;
  }
  #title {
    text-align: center;
    margin: 4px 0 10px;
    font-size: 18px;
  }
  #waveform {
    height: 110px;
    background: #000;
    margin: 10px 15px;
    border: 5px solid #333;
    border-radius: 8px;
    overflow: hidden;
  }
  .controls, .action-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 12px;
    background: #222;
    flex-wrap: wrap;
    border-radius: 12px;
    margin: 10px 15px;
  }
  button {
    background: #333;
    color: #ffd700;
    border: 5px solid #ffd700;
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 26px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:hover {
    background: #ffd700;
    color: #111;
    transform: scale(1.1);
  }
  #playBtn {
    font-size: 40px;
  }
  .action-btn {
    background: #222;
    color: #ffd700;
    border: 4px solid #ffd700;
    padding: 10px 16px;
    font-size: 18px;
    border-radius: 50px;
    transition: all 0.2s ease;
    min-width: 110px;
  }
  .action-btn:hover {
    background: #ffd700;
    color: #111;
  }
  .shuffle-btn {
    font-size: 24px;
    padding: 12px 20px;
  }
  .toggle-on {
    background: #ff2222 !important;
    color: white !important;
  }
</style>
</head>
<body>

<h1>🔥 YOUR MUSIC PLAYER</h1>
<h2 id="title">Loading track...</h2>

<div id="waveform"></div>

<div class="controls">
  <button onclick="prevPlaylist()">⏮️</button>
  <button id="playBtn" onclick="togglePlay()">▶️</button>
  <button onclick="nextPlaylist()">⏭️</button>
</div>

<div class="action-row">
  <button class="action-btn shuffle-btn" onclick="shufflePlaylist()">🔀 SHUFFLE</button>
  <button id="repeatBtn" class="action-btn" onclick="toggleRepeat()">🔁 REPEAT OFF</button>
  <button class="action-btn" onclick="likeTrack()">❤️ Like</button>
  <button class="action-btn" onclick="shareTrack()">🔗 Share</button>
  <button class="action-btn" onclick="commentTrack()">💬 Comment</button>
  <button class="action-btn" onclick="donate()">💰 Donate to $72turtle72</button>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ==================== ADD NEW SONGS / SETS HERE ====================
// Add tracks on SoundCloud.com → they appear automatically in the player
const playlists = [
  { 
    name: "🧬 VIRTUANON - ASCENSION", 
    url: "https://soundcloud.com/theacquitted/sets/the-acquitted-virtuanon" 
  }
  // Add more like this:
  // { name: "New Playlist Name", url: "https://soundcloud.com/yourname/sets/your-set" },
];

let widget;
let currentPlaylistIndex = 0;
let repeatMode = false;
let currentTrackPermalink = "";
let currentSetUrl = "";

// ==================== LOAD PLAYLIST ====================
function loadPlaylist(index) {
  if (!playlists[index]) return;
  currentPlaylistIndex = index;
  currentSetUrl = playlists[index].url;   // fallback for share/like/comment

  const container = document.getElementById('waveform');
  container.innerHTML = '';

  const iframe = document.createElement('iframe');
  iframe.id = 'sc-widget';
  iframe.width = "100%";
  iframe.height = "680";
  iframe.scrolling = "no";
  iframe.frameBorder = "no";
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(playlists[index].url)}&color=%23ff0000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true`;
  container.appendChild(iframe);

  setTimeout(() => {
    widget = SC.Widget(iframe);

    widget.bind(SC.Widget.Events.READY, () => {
      document.getElementById('title').textContent = playlists[index].name;
      // Try to get initial track info
      widget.getCurrentSound((sound) => {
        if (sound && sound.permalink_url) currentTrackPermalink = sound.permalink_url;
      });
    });

    widget.bind(SC.Widget.Events.TRACK_CHANGE, () => {
      widget.getCurrentSound((sound) => {
        if (sound && sound.permalink_url) currentTrackPermalink = sound.permalink_url;
      });
    });

    widget.bind(SC.Widget.Events.FINISH, onTrackFinish);
  }, 900);
}

// ==================== BUTTON FUNCTIONS (FIXED) ====================
function updateTrackInfo() {
  if (!widget) return;
  widget.getCurrentSound((sound) => {
    if (sound && sound.permalink_url) {
      currentTrackPermalink = sound.permalink_url;
      document.getElementById('title').textContent = sound.title || playlists[currentPlaylistIndex].name;
    }
  });
}

function onTrackFinish() {
  if (repeatMode && widget) widget.skip(0);
}

function togglePlay() {
  if (!widget) return;
  widget.toggle();
  const btn = document.getElementById('playBtn');
  btn.textContent = btn.textContent === '▶️' ? '⏸️' : '▶️';
}

function prevPlaylist() {
  let newIndex = currentPlaylistIndex - 1;
  if (newIndex < 0) newIndex = playlists.length - 1;
  loadPlaylist(newIndex);
}

function nextPlaylist() {
  let newIndex = currentPlaylistIndex + 1;
  if (newIndex >= playlists.length) newIndex = 0;
  loadPlaylist(newIndex);
}

function shufflePlaylist() {
  playlists.sort(() => Math.random() - 0.5);
  currentPlaylistIndex = 0;
  loadPlaylist(0);
}

function toggleRepeat() {
  repeatMode = !repeatMode;
  const btn = document.getElementById('repeatBtn');
  btn.textContent = repeatMode ? "🔁 REPEAT ON" : "🔁 REPEAT OFF";
  btn.classList.toggle('toggle-on', repeatMode);
}

// ==================== FIXED: Like / Share / Comment (with fallback) ====================
function likeTrack() {
  const url = currentTrackPermalink || currentSetUrl;
  if (url) {
    alert("❤️ Thanks! Opening track/set so you can like it.");
    window.open(url, '_blank');
  } else {
    alert("Player still loading — try again in a second.");
  }
}

function shareTrack() {
  const url = currentTrackPermalink || currentSetUrl;
  if (url) {
    window.open(url, '_blank');
  } else {
    alert("Player still loading — try again in a second.");
  }
}

function commentTrack() {
  const url = currentTrackPermalink || currentSetUrl;
  if (url) {
    window.open(url + "#comments", '_blank');
  } else {
    alert("Player still loading — try again in a second.");
  }
}

function donate() {
  window.open('https://cash.app/$72turtle72', '_blank');
}

// ==================== WAVEFORM ====================
function createWaveform() {
  const container = document.getElementById('waveform');
  const canvas = document.createElement('canvas');
  canvas.width = 580;
  canvas.height = 110;
  container.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffd700';
    const barWidth = 8;
    const gap = 4;
    for (let i = 0; i < 60; i++) {
      const height = Math.random() * 90 + 10;
      ctx.fillRect(i * (barWidth + gap), (canvas.height - height) / 2, barWidth, height);
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// ==================== START ====================
window.onload = function() {
  createWaveform();
  if (playlists.length > 0) {
    loadPlaylist(0);
  }
};
</script>

</body>
</html>
